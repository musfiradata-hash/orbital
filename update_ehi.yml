name: Update EHI live data

on:
  schedule:
    # Runs at 03:00 UTC on the 1st of every month.
    # VIIRS/MODIS composites for the prior month are typically available by
    # then; adjust if you find data still isn't ready at this cadence.
    - cron: '0 3 1 * *'
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab too

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install earthengine-api requests

      - name: Run the satellite data pipeline
        env:
          EE_SERVICE_ACCOUNT_KEY: ${{ secrets.EE_SERVICE_ACCOUNT_KEY }}
          EE_PROJECT_ID: ${{ secrets.EE_PROJECT_ID }}
        run: python pull_all_zones.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ehi_live.json
          git diff --staged --quiet || git commit -m "Update EHI live data ($(date -u +%Y-%m-%d))"
          git push
